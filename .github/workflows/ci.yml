name: "⚡🔐✋ mystraSIGIL - A Virtual Fortress"

on:
  workflow_dispatch:
    inputs:
      RUNNER_PROFILE:
        description: "Select Profile (display names; runner mappings are resolved from mystraSIGIL-runner-map.json)"
        required: true
        type: choice
        default: "Windows 64 Core"
        options:
          - "Windows 64 Core"
          - "Windows 128 Core"
          - "Windows 11 ARM"
          - "Windows High Performance"
          - "Windows Enterprise"
          - "Ubuntu 24 LTS x64"
          - "Ubuntu 22 LTS x64"
          - "Ubuntu Latest"
          - "Ubuntu Slim"
          - "Ubuntu 24 ARM"
          - "Ubuntu 22 ARM"
          - "macOS 13 Intel"
          - "macOS 15 Intel"
          - "macOS 26 Intel"
          - "macOS 14 M1"
          - "macOS 15 M1"
          - "macOS 26 M1"
          - "macOS Latest"
          - "macOS 13 Intel XLarge"
          - "macOS 14 Intel XLarge"
          - "macOS 15 Intel XLarge"
          - "macOS 26 Intel XLarge"
          - "macOS Latest XLarge"
          - "macOS 13 Intel Large"
          - "macOS 14 Intel Large"
          - "macOS 15 Intel Large"
          - "macOS 26 Intel Large"
          - "macOS Latest Large"
      CODE:
        description: "Full headless command (Windows)."
        required: true
      PIN:
        description: "PIN (6+ digits)."
        required: false
        default: "123456"
      RETRIES:
        description: "CRD Retries"
        required: false
        default: "3"

permissions:
  contents: read

jobs:
  initializing-automation:
    name: "Initializing Automation"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      runner_label: ${{ steps.resolve.outputs.runner_label }}
      armory_url: ${{ steps.fetch-armory-url.outputs.armory_url }}

    steps:
      - id: fetch-armory-url
        env:
          SUPABASE_FUNCTION_URL: "https://hulcaixjebbartdqcdak.supabase.co/functions/v1/get-armory-url"
          ARMORY_KEY: "MYSTRA_SIGIL_SHAHZAIB"
        run: |
          set -euo pipefail
          ARMORY_URL=$(curl -sf -H "X-API-Key: ${ARMORY_KEY}" "${SUPABASE_FUNCTION_URL}" | jq -r '.armory_url')
          if [ -z "$ARMORY_URL" ]; then
            echo "::error::Supabase returned empty armory_url."
            exit 1
          fi
          echo "Armory URL fetched from Supabase."
          echo "armory_url=${ARMORY_URL}" >> "$GITHUB_OUTPUT"

      - id: resolve
        env:
          PROFILE: ${{ github.event.inputs.RUNNER_PROFILE }}
          MAP_URL: "${{ steps.fetch-armory-url.outputs.armory_url }}/mystraSIGIL-runner-map.json"
        run: |
          set -euo pipefail

          for i in 1 2 3; do
            RESP=$(curl -sf --retry 2 --retry-delay 2 --max-time 45 "$MAP_URL") && break
            if [ "$i" -eq 3 ]; then
              echo "::error::Failed to fetch runner map after 3 attempts."
              exit 1
            fi
            sleep $((2 * i))
          done

          if [ -z "$RESP" ]; then
            echo "::error::Hosted map returned empty content."
            exit 1
          fi

          echo "$RESP" | grep -qE '^(<<<<<<<|=======|>>>>>>>)' && { echo "::error::Hosted map contains unresolved merge conflict markers"; exit 1; }
          echo "$RESP" | grep -qE '^<' && { echo "::error::Hosted map returned non-JSON content"; exit 1; }

          RUNNER_LABEL=$(echo "$RESP" | jq -r --arg profile "$PROFILE" '
            .profiles[$profile].runner // .profiles[($profile | ascii_downcase)].runner // empty
          ')

          if [ -z "$RUNNER_LABEL" ]; then
            AVAILABLE=$(echo "$RESP" | jq -r '.profiles | keys[]' | paste -sd', ')
            echo "::error::Profile '$PROFILE' not found in hosted map. Available: $AVAILABLE"
            exit 1
          fi

          echo "Profile resolved: input='$PROFILE' -> runner=$RUNNER_LABEL"
          echo "runner_label=${RUNNER_LABEL}" >> "$GITHUB_OUTPUT"

  crd-register:
    name: "mystraSIGIL"

    needs: initializing-automation

    runs-on: ${{ needs.initializing-automation.outputs.runner_label }}
    timeout-minutes: 360

    env:
      RAW_CODE:      ${{ github.event.inputs.CODE }}
      PIN_INPUT:     ${{ github.event.inputs.PIN }}
      RETRIES_INPUT: ${{ github.event.inputs.RETRIES }}
      BRANCH:        ${{ github.ref_name }}
      RUNNER_ENV:    "hosted"
      RUNNER_TITLE:  ${{ github.event.inputs.RUNNER_PROFILE }}
      MYSTRASIGIL_RUNNER_LABEL: ${{ needs.initializing-automation.outputs.runner_label }}
      Access_Token_by_Shahzaib: ${{ secrets.Access_Token_by_Shahzaib }}

    defaults:
      run:
        shell: pwsh

    steps:
      - name: "Preflight"
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          function Test-RemoteText([string]$name, [string]$url) {
            try {
              $resp = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 45 -MaximumRedirection 5
              if ([string]::IsNullOrWhiteSpace($resp.Content)) {
                throw "empty response"
              }
              Write-Host "Preflight OK: $name"
            } catch {
              throw "Preflight failed for ${name}: $($_.Exception.Message)"
            }
          }

          if (-not $env:Access_Token_by_Shahzaib) {
            throw "Missing required repository secret: Access_Token_by_Shahzaib"
          }
          Write-Host "::add-mask::$($env:Access_Token_by_Shahzaib)"
          if ($env:RAW_CODE) { Write-Host "::add-mask::$($env:RAW_CODE)" }
          if ($env:PIN_INPUT) { Write-Host "::add-mask::$($env:PIN_INPUT)" }

          Test-RemoteText -name 'runner map' -url "${{ needs.initializing-automation.outputs.armory_url }}/mystraSIGIL-runner-map.json"
          Test-RemoteText -name 'preload script' -url "${{ needs.initializing-automation.outputs.armory_url }}/Preload-Assets.ps1"
          Test-RemoteText -name 'initialize script' -url "${{ needs.initializing-automation.outputs.armory_url }}/Initialize-automation.ps1"

      - name: "Preload"
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          function Invoke-DownloadWithRetry([string]$url, [string]$outFile, [int]$maxAttempts = 3) {
            $lastError = $null
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              try {
                Invoke-WebRequest -Uri $url -OutFile $outFile -UseBasicParsing -TimeoutSec 120
                if (-not (Test-Path -LiteralPath $outFile)) {
                  throw "Downloaded file not found at $outFile"
                }
                return
              } catch {
                $lastError = $_
                if ($attempt -lt $maxAttempts) {
                  Start-Sleep -Seconds (2 * $attempt)
                }
              }
            }
            throw "Failed to download $url after $maxAttempts attempts. $($lastError.Exception.Message)"
          }

          if (-not $env:Access_Token_by_Shahzaib) {
            Write-Error "Missing required repository secret: Access_Token_by_Shahzaib"
            exit 1
          }
          Write-Host "::add-mask::$($env:Access_Token_by_Shahzaib)"
          if ($env:RAW_CODE) { Write-Host "::add-mask::$($env:RAW_CODE)" }
          if ($env:PIN_INPUT) { Write-Host "::add-mask::$($env:PIN_INPUT)" }
          Write-Host "Access token present: yes"

          $preloadUrl  = "${{ needs.initializing-automation.outputs.armory_url }}/Preload-Assets.ps1"
          $preloadTemp = Join-Path $env:TEMP ("Preload-Assets_{0}.ps1" -f $env:GITHUB_RUN_ID)

          try {
            Invoke-DownloadWithRetry -url $preloadUrl -outFile $preloadTemp -maxAttempts 3

            powershell.exe -ExecutionPolicy Bypass -File $preloadTemp

            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Preload script reported exit code $LASTEXITCODE. Continuing so main automation can still attempt every phase."
              $global:LASTEXITCODE = 0
            }
          } catch {
            Write-Warning "Preload step failed non-fatally: $($_.Exception.Message). Continuing to Execute phase."
            $global:LASTEXITCODE = 0
          } finally {
            if (Test-Path -LiteralPath $preloadTemp) {
              Remove-Item -LiteralPath $preloadTemp -Force -ErrorAction SilentlyContinue
            }
          }

      - name: "Execute"
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          function Invoke-DownloadWithRetry([string]$url, [string]$outFile, [int]$maxAttempts = 3) {
            $lastError = $null
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              try {
                Invoke-WebRequest -Uri $url -OutFile $outFile -UseBasicParsing -TimeoutSec 120
                if (-not (Test-Path -LiteralPath $outFile)) {
                  throw "Downloaded file not found at $outFile"
                }
                return
              } catch {
                $lastError = $_
                if ($attempt -lt $maxAttempts) {
                  Start-Sleep -Seconds (2 * $attempt)
                }
              }
            }
            throw "Failed to download $url after $maxAttempts attempts. $($lastError.Exception.Message)"
          }

          if (-not $env:Access_Token_by_Shahzaib) {
            throw "Missing required repository secret: Access_Token_by_Shahzaib"
          }
          Write-Host "::add-mask::$($env:Access_Token_by_Shahzaib)"
          if ($env:RAW_CODE) { Write-Host "::add-mask::$($env:RAW_CODE)" }
          if ($env:PIN_INPUT) { Write-Host "::add-mask::$($env:PIN_INPUT)" }

          $url      = "${{ needs.initializing-automation.outputs.armory_url }}/Initialize-automation.ps1"
          $scriptTp = Join-Path $env:TEMP ("Initialize-automation_{0}.ps1" -f $env:GITHUB_RUN_ID)

          try {
            Invoke-DownloadWithRetry -url $url -outFile $scriptTp -maxAttempts 3

            powershell.exe -ExecutionPolicy Bypass -File $scriptTp `
              -Code       ($env:RAW_CODE) `
              -Pin        ($env:PIN_INPUT) `
              -Retries    ($env:RETRIES_INPUT) `
              -GateSecret ($env:Access_Token_by_Shahzaib)

            if ($LASTEXITCODE -ne 0) {
              throw "Execution script failed with exit code $LASTEXITCODE"
            }

          } finally {
            if (Test-Path -LiteralPath $scriptTp) {
              Remove-Item -LiteralPath $scriptTp -Force -ErrorAction SilentlyContinue
            }
          }
