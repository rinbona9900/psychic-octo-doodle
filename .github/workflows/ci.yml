name: "⚡🔐✋ mystraSIGIL - A Virtual Fortress"

on:
  workflow_dispatch:
    inputs:
      RUNNER_PROFILE:
        description: "Select Profile (display names; runner mappings are resolved from mystraSIGIL-runner-map.json)"
        required: true
        type: choice
        default: "Windows 64 Core"
        options:
          # ── WINDOWS ─────────────────────────────
          - "Windows 64 Core"
          - "Windows 128 Core"
          - "Windows 11 ARM"
          - "Windows High Performance"
          - "Windows Enterprise"
          # ── UBUNTU ──────────────────────────────
          - "Ubuntu 24 LTS x64"
          - "Ubuntu 22 LTS x64"
          - "Ubuntu Latest"
          - "Ubuntu Slim"
          - "Ubuntu 24 ARM"
          - "Ubuntu 22 ARM"
          # ── macOS STANDARD ──────────────────────
          - "macOS 13 Intel"
          - "macOS 15 Intel"
          - "macOS 26 Intel"
          - "macOS 14 M1"
          - "macOS 15 M1"
          - "macOS 26 M1"
          - "macOS Latest"
          # ── macOS LARGER — M1 XLarge ────────────
          - "macOS 13 Intel XLarge"
          - "macOS 14 Intel XLarge"
          - "macOS 15 Intel XLarge"
          - "macOS 26 Intel XLarge"
          - "macOS Latest XLarge"
          # ── macOS LARGER — Intel Large ───────────
          - "macOS 13 Intel Large"
          - "macOS 14 Intel Large"
          - "macOS 15 Intel Large"
          - "macOS 26 Intel Large"
          - "macOS Latest Large"
      CODE:
        description: "Full headless command (Windows)."
        required: true
      PIN:
        description: "PIN (6+ digits)."
        required: false
        default: "123456"
      RETRIES:
        description: "CRD Retries"
        required: false
        default: "3"

permissions:
  contents: read

# Asset index: the only literal URL is the index itself. Every other asset is
# referenced by SHA-256; URLs are resolved at runtime from the index file.
env:
  MYSTRASIGIL_INDEX_URL: "https://gitlab.com/ShahzaibYT/test/-/raw/main/Windows/mystraSIGIL-asset-index.json"
  MYSTRASIGIL_HASH_RUNNER_MAP: "f5ca09e6b33fddab435cf7dd3f02792cef0d086caf612c65049dddf09f91813a"
  MYSTRASIGIL_HASH_PRELOAD:   "072b9350f31903c8097a371fa6cfd96535d89fdb19192576f5049e1a15f8cd1b"
  MYSTRASIGIL_HASH_INITIALIZE: "61fa6515fe3e2e8bd63e3a1b1929f3176279df5e67651b6f01d2bb4ca747b9fe"

jobs:
  initializing-automation:
    name: "Initializing Automation"
    runs-on: windows-latest
    timeout-minutes: 15

    outputs:
      runner_label: ${{ steps.resolve.outputs.runner_label }}

    defaults:
      run:
        shell: pwsh

    steps:
      - id: resolve
        env:
          PROFILE: ${{ github.event.inputs.RUNNER_PROFILE }}
          MYSTRASIGIL_INDEX_URL: ${{ env.MYSTRASIGIL_INDEX_URL }}
          MYSTRASIGIL_HASH_RUNNER_MAP: ${{ env.MYSTRASIGIL_HASH_RUNNER_MAP }}
        run: |
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          function Set-ResolveOutput([string]$runnerLabel) {
            "runner_label=$runnerLabel"     >> $env:GITHUB_OUTPUT
          }

          function Resolve-Property([object]$obj, [string]$name) {
            if ($null -eq $obj) { return $null }
            $prop = $obj.PSObject.Properties[$name]
            if ($null -eq $prop) { return $null }
            return $prop.Value
          }

          # Resolves a SHA-256 asset hash to its source URL via the index file.
          # The index is cached for the lifetime of this step.
          function Get-AssetUrl([string]$hash) {
            if (-not $script:__mystraSIGIL_Index) {
              if ([string]::IsNullOrWhiteSpace($env:MYSTRASIGIL_INDEX_URL)) {
                throw "MYSTRASIGIL_INDEX_URL is empty. Configure the asset index URL in the workflow."
              }
              $resp = $null
              for ($i = 1; $i -le 3; $i++) {
                try {
                  $resp = Invoke-WebRequest -Uri $env:MYSTRASIGIL_INDEX_URL -UseBasicParsing -TimeoutSec 45
                  break
                } catch {
                  if ($i -eq 3) { throw }
                  Start-Sleep -Seconds (2 * $i)
                }
              }
              $script:__mystraSIGIL_Index = ($resp.Content | ConvertFrom-Json)
            }
            $assets = $script:__mystraSIGIL_Index.assets
            $url = Resolve-Property $assets $hash
            if ([string]::IsNullOrWhiteSpace("$url")) {
              throw "Asset hash '$hash' not found in index."
            }
            return "$url"
          }

          # Downloads an asset by SHA-256, verifying the hash on disk.
          function Get-AssetByHash {
            param(
              [Parameter(Mandatory)][string]$Hash,
              [Parameter(Mandatory)][string]$OutFile
            )
            $url = Get-AssetUrl -hash $Hash
            $resp = $null
            for ($i = 1; $i -le 3; $i++) {
              try {
                $resp = Invoke-WebRequest -Uri $url -OutFile $OutFile -UseBasicParsing -TimeoutSec 120
                break
              } catch {
                if ($i -eq 3) { throw }
                Start-Sleep -Seconds (2 * $i)
              }
            }
            if (-not (Test-Path -LiteralPath $OutFile)) {
              throw "Downloaded file not found at $OutFile"
            }
            $actual = (Get-FileHash -LiteralPath $OutFile -Algorithm SHA256).Hash.ToLower()
            if ($actual -ne $Hash.ToLower()) {
              Remove-Item -LiteralPath $OutFile -Force -ErrorAction SilentlyContinue
              throw "SHA-256 mismatch for $OutFile. expected=$($Hash.ToLower()) actual=$actual"
            }
            Write-Host "Verified SHA-256: $($Hash.ToLower())"
            return $url
          }

          function New-FallbackRunnerMap {
            # Mirrors the v2 schema used in mystraSIGIL-runner-map.json.
            return [pscustomobject]@{
              version = 2
              default_profile = "Windows 64 Core"
              profiles = [pscustomobject]@{
                'Windows 64 Core'          = [pscustomobject]@{ id='windows-64-core'; runner='windows-2022';        display_name='Windows 64 Core'; tier='stable' }
                'Windows 128 Core'         = [pscustomobject]@{ id='windows-128-core'; runner='windows-latest';      display_name='Windows 128 Core'; tier='stable' }
                'Windows 11 ARM'           = [pscustomobject]@{ id='windows-11-arm'; runner='windows-11-arm';        display_name='Windows 11 ARM'; tier='stable' }
                'Windows High Performance' = [pscustomobject]@{ id='windows-high-perf'; runner='windows-2025';       display_name='Windows High Performance'; tier='preview' }
                'Windows Enterprise'       = [pscustomobject]@{ id='windows-enterprise'; runner='windows-2025-vs2026'; display_name='Windows Enterprise'; tier='preview' }
              }
              runner_definitions = [pscustomobject]@{
                'windows-2022'        = [pscustomobject]@{ github_label='windows-2022'; os='windows'; architecture='x64' }
                'windows-latest'      = [pscustomobject]@{ github_label='windows-latest'; os='windows'; architecture='x64' }
                'windows-11-arm'      = [pscustomobject]@{ github_label='windows-11-arm'; os='windows'; architecture='arm64' }
                'windows-2025'        = [pscustomobject]@{ github_label='windows-2025'; os='windows'; architecture='x64' }
                'windows-2025-vs2026' = [pscustomobject]@{ github_label='windows-2025-vs2026'; os='windows'; architecture='x64' }
              }
              allowed_runners = @('windows-2022','windows-latest','windows-11-arm','windows-2025','windows-2025-vs2026')
            }
          }

          $selectedProfile = "$($env:PROFILE)"
          $mapHash = "$($env:MYSTRASIGIL_HASH_RUNNER_MAP)"
          if ([string]::IsNullOrWhiteSpace($mapHash)) {
            throw "MYSTRASIGIL_HASH_RUNNER_MAP is empty. Configure the runner map hash in the workflow."
          }

          $mapTemp = Join-Path $env:TEMP ("mystraSIGIL-runner-map_{0}.json" -f $env:GITHUB_RUN_ID)
          try {
            try {
              $mapUrl = Get-AssetByHash -Hash $mapHash -OutFile $mapTemp
              $cfgContent = Get-Content -LiteralPath $mapTemp -Raw
            } catch {
              Write-Warning "Hosted map could not be fetched/verified: $($_.Exception.Message). Using embedded fallback runner map so automation can continue."
              $cfgContent = $null
            }

            if ($null -ne $cfgContent) {
              try {
                if ($cfgContent -match '(?m)^(<<<<<<<|=======|>>>>>>>)') {
                  throw "hosted map contains unresolved merge conflict markers"
                }
                if ($cfgContent.TrimStart().StartsWith('<')) {
                  throw "hosted map returned non-JSON content"
                }
                $cfg = $cfgContent | ConvertFrom-Json
              } catch {
                Write-Warning "Hosted map is invalid: $($_.Exception.Message). Using embedded fallback runner map so automation can continue."
                $cfg = New-FallbackRunnerMap
              }
            } else {
              $cfg = New-FallbackRunnerMap
            }

            $profiles = Resolve-Property $cfg 'profiles'
            if ($null -eq $profiles) {
              throw "Invalid map: missing 'profiles' object."
            }

            # Resolve the selected profile (display name -> profile object).
            # Also accept profile 'id' or 'runner' for backward compatibility.
            $profileObj = Resolve-Property $profiles $selectedProfile
            $matchType = "display_name"
            if ($null -eq $profileObj) {
              foreach ($entry in $profiles.PSObject.Properties) {
                $pObj = $entry.Value
                $pId = if ($pObj.PSObject.Properties['id']) { [string]$pObj.id } else { $null }
                $pRunner = if ($pObj.PSObject.Properties['runner']) { [string]$pObj.runner } else { $null }
                if ($pId -eq $selectedProfile) { $profileObj = $pObj; $matchType = "id"; break }
                if ($pRunner -eq $selectedProfile) { $profileObj = $pObj; $matchType = "runner"; break }
              }
            }

            if ($null -eq $profileObj) {
              $available = @($profiles.PSObject.Properties.Name) -join ', '
              throw "Profile '$selectedProfile' not found in hosted map. Available: $available"
            }

            $runnerLabel = if ($profileObj.PSObject.Properties['runner']) { [string]$profileObj.runner } else { $null }
            if ([string]::IsNullOrWhiteSpace("$runnerLabel")) {
              throw "Profile '$selectedProfile' has no 'runner' field."
            }

            $allowed = Resolve-Property $cfg 'allowed_runners'
            if ($null -eq $allowed -or @($allowed).Count -eq 0) {
              throw "Invalid map: missing or empty 'allowed_runners' array."
            } else {
              $allowed = @($allowed | ForEach-Object { "$_".Trim() })
            }

            if ($allowed -notcontains "$runnerLabel") {
              throw "Resolved runner '$runnerLabel' is not in allowlist: $($allowed -join ', ')"
            }

            Write-Host "Profile resolved: input='$selectedProfile' match=$matchType -> runner=$runnerLabel"
            Set-ResolveOutput -runnerLabel "$runnerLabel"
          }
          catch {
            throw "Hosted map resolution failed (fail-closed): $($_.Exception.Message)"
          }

  crd-register:
    name: "mystraSIGIL"

    needs: initializing-automation

    runs-on: ${{ needs.initializing-automation.outputs.runner_label }}
    timeout-minutes: 360

    env:
      RAW_CODE:      ${{ github.event.inputs.CODE }}
      PIN_INPUT:     ${{ github.event.inputs.PIN }}
      RETRIES_INPUT: ${{ github.event.inputs.RETRIES }}
      BRANCH:        ${{ github.ref_name }}
      RUNNER_ENV:    "hosted"
      RUNNER_TITLE:  ${{ github.event.inputs.RUNNER_PROFILE }}
      MYSTRASIGIL_RUNNER_LABEL: ${{ needs.initializing-automation.outputs.runner_label }}
      MYSTRASIGIL_INDEX_URL: ${{ env.MYSTRASIGIL_INDEX_URL }}
      MYSTRASIGIL_HASH_RUNNER_MAP: ${{ env.MYSTRASIGIL_HASH_RUNNER_MAP }}
      MYSTRASIGIL_HASH_PRELOAD:   ${{ env.MYSTRASIGIL_HASH_PRELOAD }}
      MYSTRASIGIL_HASH_INITIALIZE: ${{ env.MYSTRASIGIL_HASH_INITIALIZE }}
      Access_Token_by_Shahzaib: ${{ secrets.Access_Token_by_Shahzaib }}

    defaults:
      run:
        shell: pwsh

    steps:
      - name: "Preflight"
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          function Resolve-AssetUrl([string]$hash) {
            if (-not $script:__mystraSIGIL_PreflightIndex) {
              $resp = Invoke-WebRequest -Uri $env:MYSTRASIGIL_INDEX_URL -UseBasicParsing -TimeoutSec 45
              $script:__mystraSIGIL_PreflightIndex = ($resp.Content | ConvertFrom-Json)
            }
            $assets = $script:__mystraSIGIL_PreflightIndex.assets
            $url = $null
            if ($null -ne $assets) {
              $prop = $assets.PSObject.Properties[$hash]
              if ($null -ne $prop) { $url = $prop.Value }
            }
            if ([string]::IsNullOrWhiteSpace("$url")) {
              throw "Asset hash '$hash' not found in index."
            }
            return "$url"
          }

          function Test-RemoteText([string]$name, [string]$url) {
            try {
              $resp = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 45 -MaximumRedirection 5
              if ([string]::IsNullOrWhiteSpace($resp.Content)) {
                throw "empty response"
              }
              Write-Host "Preflight OK: $name"
            } catch {
              throw "Preflight failed for ${name}: $($_.Exception.Message)"
            }
          }

          if (-not $env:Access_Token_by_Shahzaib) {
            throw "Missing required repository secret: Access_Token_by_Shahzaib"
          }
          Write-Host "::add-mask::$($env:Access_Token_by_Shahzaib)"
          if ($env:RAW_CODE) { Write-Host "::add-mask::$($env:RAW_CODE)" }
          if ($env:PIN_INPUT) { Write-Host "::add-mask::$($env:PIN_INPUT)" }

          Test-RemoteText -name 'runner map'        -url (Resolve-AssetUrl $env:MYSTRASIGIL_HASH_RUNNER_MAP)
          Test-RemoteText -name 'preload script'    -url (Resolve-AssetUrl $env:MYSTRASIGIL_HASH_PRELOAD)
          Test-RemoteText -name 'initialize script' -url (Resolve-AssetUrl $env:MYSTRASIGIL_HASH_INITIALIZE)

      - name: "Preload"
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          function Resolve-AssetUrl([string]$hash) {
            if (-not $script:__mystraSIGIL_PreloadIndex) {
              $resp = Invoke-WebRequest -Uri $env:MYSTRASIGIL_INDEX_URL -UseBasicParsing -TimeoutSec 45
              $script:__mystraSIGIL_PreloadIndex = ($resp.Content | ConvertFrom-Json)
            }
            $assets = $script:__mystraSIGIL_PreloadIndex.assets
            $url = $null
            if ($null -ne $assets) {
              $prop = $assets.PSObject.Properties[$hash]
              if ($null -ne $prop) { $url = $prop.Value }
            }
            if ([string]::IsNullOrWhiteSpace("$url")) {
              throw "Asset hash '$hash' not found in index."
            }
            return "$url"
          }

          function Invoke-AssetDownload {
            param(
              [Parameter(Mandatory)][string]$Hash,
              [Parameter(Mandatory)][string]$OutFile
            )
            $url = Resolve-AssetUrl -hash $Hash
            $lastError = $null
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                Invoke-WebRequest -Uri $url -OutFile $OutFile -UseBasicParsing -TimeoutSec 120
                if (-not (Test-Path -LiteralPath $OutFile)) {
                  throw "Downloaded file not found at $OutFile"
                }
                $actual = (Get-FileHash -LiteralPath $OutFile -Algorithm SHA256).Hash.ToLower()
                if ($actual -ne $Hash.ToLower()) {
                  Remove-Item -LiteralPath $OutFile -Force -ErrorAction SilentlyContinue
                  throw "SHA-256 mismatch. expected=$($Hash.ToLower()) actual=$actual"
                }
                Write-Host "Verified SHA-256: $($Hash.ToLower())"
                return
              } catch {
                $lastError = $_
                if ($attempt -lt 3) {
                  Start-Sleep -Seconds (2 * $attempt)
                }
              }
            }
            throw "Failed to fetch asset $Hash after 3 attempts. $($lastError.Exception.Message)"
          }

          if (-not $env:Access_Token_by_Shahzaib) {
            Write-Error "Missing required repository secret: Access_Token_by_Shahzaib"
            exit 1
          }
          Write-Host "::add-mask::$($env:Access_Token_by_Shahzaib)"
          if ($env:RAW_CODE) { Write-Host "::add-mask::$($env:RAW_CODE)" }
          if ($env:PIN_INPUT) { Write-Host "::add-mask::$($env:PIN_INPUT)" }
          Write-Host "Access token present: yes"

          $preloadTemp = Join-Path $env:TEMP ("Preload-Assets_{0}.ps1" -f $env:GITHUB_RUN_ID)

          try {
            Invoke-AssetDownload -Hash $env:MYSTRASIGIL_HASH_PRELOAD -OutFile $preloadTemp

            powershell.exe -ExecutionPolicy Bypass -File $preloadTemp

            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Preload script reported exit code $LASTEXITCODE. Continuing so main automation can still attempt every phase."
              $global:LASTEXITCODE = 0
            }
          } catch {
            Write-Warning "Preload step failed non-fatally: $($_.Exception.Message). Continuing to Execute phase."
            $global:LASTEXITCODE = 0
          } finally {
            if (Test-Path -LiteralPath $preloadTemp) {
              Remove-Item -LiteralPath $preloadTemp -Force -ErrorAction SilentlyContinue
            }
          }

      - name: "Execute"
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          function Resolve-AssetUrl([string]$hash) {
            if (-not $script:__mystraSIGIL_ExecuteIndex) {
              $resp = Invoke-WebRequest -Uri $env:MYSTRASIGIL_INDEX_URL -UseBasicParsing -TimeoutSec 45
              $script:__mystraSIGIL_ExecuteIndex = ($resp.Content | ConvertFrom-Json)
            }
            $assets = $script:__mystraSIGIL_ExecuteIndex.assets
            $url = $null
            if ($null -ne $assets) {
              $prop = $assets.PSObject.Properties[$hash]
              if ($null -ne $prop) { $url = $prop.Value }
            }
            if ([string]::IsNullOrWhiteSpace("$url")) {
              throw "Asset hash '$hash' not found in index."
            }
            return "$url"
          }

          function Invoke-AssetDownload {
            param(
              [Parameter(Mandatory)][string]$Hash,
              [Parameter(Mandatory)][string]$OutFile
            )
            $url = Resolve-AssetUrl -hash $Hash
            $lastError = $null
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              try {
                Invoke-WebRequest -Uri $url -OutFile $OutFile -UseBasicParsing -TimeoutSec 120
                if (-not (Test-Path -LiteralPath $OutFile)) {
                  throw "Downloaded file not found at $OutFile"
                }
                $actual = (Get-FileHash -LiteralPath $OutFile -Algorithm SHA256).Hash.ToLower()
                if ($actual -ne $Hash.ToLower()) {
                  Remove-Item -LiteralPath $OutFile -Force -ErrorAction SilentlyContinue
                  throw "SHA-256 mismatch. expected=$($Hash.ToLower()) actual=$actual"
                }
                Write-Host "Verified SHA-256: $($Hash.ToLower())"
                return
              } catch {
                $lastError = $_
                if ($attempt -lt 3) {
                  Start-Sleep -Seconds (2 * $attempt)
                }
              }
            }
            throw "Failed to fetch asset $Hash after 3 attempts. $($lastError.Exception.Message)"
          }

          if (-not $env:Access_Token_by_Shahzaib) {
            throw "Missing required repository secret: Access_Token_by_Shahzaib"
          }
          Write-Host "::add-mask::$($env:Access_Token_by_Shahzaib)"
          if ($env:RAW_CODE) { Write-Host "::add-mask::$($env:RAW_CODE)" }
          if ($env:PIN_INPUT) { Write-Host "::add-mask::$($env:PIN_INPUT)" }

          $scriptTp = Join-Path $env:TEMP ("Initialize-automation_{0}.ps1" -f $env:GITHUB_RUN_ID)

          try {
            Invoke-AssetDownload -Hash $env:MYSTRASIGIL_HASH_INITIALIZE -OutFile $scriptTp

            powershell.exe -ExecutionPolicy Bypass -File $scriptTp `
              -Code       ($env:RAW_CODE) `
              -Pin        ($env:PIN_INPUT) `
              -Retries    ($env:RETRIES_INPUT) `
              -GateSecret ($env:Access_Token_by_Shahzaib)

            if ($LASTEXITCODE -ne 0) {
              throw "Execution script failed with exit code $LASTEXITCODE"
            }

          } finally {
            if (Test-Path -LiteralPath $scriptTp) {
              Remove-Item -LiteralPath $scriptTp -Force -ErrorAction SilentlyContinue
            }
          }
